task: classification

model:
  name: resnet50
  pretrained: true
  num_classes: 1000
  weights: null

data:
  image_size: 224
  batch_size: 32
  num_workers: 4
  pin_memory: true
  train_split: 0.8
  augmentation: default

training:
  epochs: 10
  lr: 0.001
  optimizer: adam
  scheduler: cosine
  weight_decay: 0.0001
  early_stopping_patience: 5
  mixed_precision: true
  gradient_clip: 1.0

inference:
  device: auto
  batch_size: 1
  confidence_threshold: 0.5
  nms_threshold: 0.45

logging:
  level: INFO
  log_dir: runs
  use_wandb: false
  use_tensorboard: true
