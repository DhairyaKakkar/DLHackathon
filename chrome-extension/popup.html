<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EALE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,700;1,9..144,800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #fafaf8;
      --surface: #ffffff;
      --border:  #d0cec9;
      --border-quiet: #ece9e4;
      --text:    #111113;
      --text-2:  #5c5c6e;
      --text-3:  #9e9eae;
      --accent:  #e8325a;
    }

    body {
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      width: 300px;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-box {
      width: 28px;
      height: 28px;
      background: #111113;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-box span {
      font-family: "Fraunces", Georgia, serif;
      font-style: italic;
      font-weight: 800;
      font-size: 15px;
      color: #fff;
      line-height: 1;
    }

    .header-text .title {
      font-family: "Fraunces", Georgia, serif;
      font-style: italic;
      font-weight: 800;
      font-size: 14px;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .header-text .sub {
      font-size: 10px;
      color: var(--text-3);
      margin-top: 1px;
    }

    .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }

    .student-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
    }

    .student-label {
      font-size: 9px;
      color: var(--text-3);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 3px;
    }

    .student-name  { font-size: 13px; font-weight: 600; color: var(--text); }
    .student-key   { font-size: 10px; color: var(--text-3); font-family: "JetBrains Mono", monospace; margin-top: 1px; }

    .quiz-btn {
      background: #111113;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background .12s, transform .08s;
      font-family: "DM Sans", sans-serif;
    }
    .quiz-btn:hover  { background: #2a2a32; }
    .quiz-btn:active { transform: scale(0.98); }
    .quiz-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    .status-msg { font-size: 11px; color: var(--text-3); text-align: center; min-height: 14px; }
    .status-msg.ok  { color: #15803d; }
    .status-msg.err { color: #dc2626; }

    .divider { height: 1px; background: var(--border-quiet); }

    .quick-select { display: flex; flex-direction: column; gap: 4px; }
    .qs-label {
      font-size: 9px; color: var(--text-3); font-weight: 600;
      text-transform: uppercase; letter-spacing: .07em;
    }
    .qs-btns { display: flex; gap: 5px; }

    .qs-btn {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 4px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-2);
      cursor: pointer;
      transition: all .12s;
      text-align: center;
      font-family: "DM Sans", sans-serif;
    }
    .qs-btn:hover  { border-color: #111113; color: #111113; }
    .qs-btn.active { border-color: #111113; background: #111113; color: #fff; }

    .links { display: flex; gap: 5px; }

    .link-btn {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 4px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-2);
      cursor: pointer;
      transition: all .12s;
      text-align: center;
      text-decoration: none;
      display: block;
      font-family: "DM Sans", sans-serif;
    }
    .link-btn:hover { border-color: #111113; color: #111113; background: #fafaf8; }

    .footer {
      border-top: 1px solid var(--border-quiet);
      padding: 9px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
    }

    .footer a {
      font-size: 11px;
      color: var(--text-3);
      text-decoration: none;
      transition: color .12s;
      font-family: "DM Sans", sans-serif;
    }
    .footer a:hover { color: var(--text); }
    .footer .accent-link { color: var(--accent); font-weight: 600; }
    .footer .accent-link:hover { color: #c41f47; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-box"><span>E</span></div>
    <div class="header-text">
      <div class="title">EALE</div>
      <div class="sub">Evidence-Aligned Learning</div>
    </div>
  </div>

  <div class="body">
    <div class="student-row">
      <div class="student-label">Active Student</div>
      <div class="student-name" id="studentName">Loading…</div>
      <div class="student-key" id="studentKey"></div>
    </div>

    <button class="quiz-btn" id="quizBtn">Trigger EALE Check on Current Tab</button>
    <div class="status-msg" id="statusMsg"></div>

    <div class="divider"></div>

    <div class="links">
      <a class="link-btn" href="http://localhost:3000/student/1" target="_blank">Alice</a>
      <a class="link-btn" href="http://localhost:3000/student/2" target="_blank">Bob</a>
      <a class="link-btn" href="http://localhost:3000/faculty" target="_blank">Faculty</a>
    </div>
  </div>

  <div class="footer">
    <a href="#" id="optionsLink">Settings</a>
    <a class="accent-link" href="http://localhost:3000" target="_blank">Open EALE →</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
