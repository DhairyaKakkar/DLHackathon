<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EALE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,700;1,9..144,800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #fafaf8;
      --surface: #ffffff;
      --border:  #d0cec9;
      --border-quiet: #ece9e4;
      --text:    #111113;
      --text-2:  #5c5c6e;
      --text-3:  #9e9eae;
      --accent:  #e8325a;
      --indigo:  #4f46e5;
    }

    body {
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      width: 300px;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-box {
      width: 28px; height: 28px;
      background: #111113;
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-box span {
      font-family: "Fraunces", Georgia, serif;
      font-style: italic; font-weight: 800; font-size: 15px;
      color: #fff; line-height: 1;
    }
    .header-text .title {
      font-family: "Fraunces", Georgia, serif;
      font-style: italic; font-weight: 800; font-size: 14px;
      color: var(--text); letter-spacing: -0.01em;
    }
    .header-text .sub { font-size: 10px; color: var(--text-3); margin-top: 1px; }

    /* ── Views ── */
    .view { display: none; }
    .view.active { display: block; }

    /* ── Auth view ── */
    .auth-body { padding: 18px 16px; display: flex; flex-direction: column; gap: 14px; }

    .auth-tabs { display: flex; gap: 2px; background: #f1f0ee; border-radius: 8px; padding: 3px; }
    .auth-tab {
      flex: 1; padding: 7px 0; border: none; background: transparent;
      border-radius: 6px; font-size: 12px; font-weight: 600;
      color: var(--text-3); cursor: pointer; transition: all .12s;
      font-family: "DM Sans", sans-serif;
    }
    .auth-tab.active { background: #fff; color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.08); }

    .auth-form { display: none; flex-direction: column; gap: 10px; }
    .auth-form.active { display: flex; }

    .field-label {
      font-size: 10px; font-weight: 600; color: var(--text-2);
      text-transform: uppercase; letter-spacing: .05em;
      display: block; margin-bottom: 4px;
    }
    .field-input {
      width: 100%; border: 1px solid var(--border);
      border-radius: 7px; padding: 9px 11px;
      font-size: 12px; font-family: "DM Sans", sans-serif;
      color: var(--text); background: var(--surface);
      outline: none; transition: border-color .12s;
    }
    .field-input:focus { border-color: var(--indigo); }
    .field-input.mono { font-family: "JetBrains Mono", monospace; font-size: 11px; }

    .primary-btn {
      background: #111113; color: #fff; border: none;
      border-radius: 8px; padding: 10px; font-size: 13px;
      font-weight: 600; cursor: pointer; width: 100%;
      transition: background .12s, transform .08s;
      font-family: "DM Sans", sans-serif;
    }
    .primary-btn:hover  { background: #2a2a32; }
    .primary-btn:active { transform: scale(0.98); }
    .primary-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    .primary-btn.indigo { background: var(--indigo); }
    .primary-btn.indigo:hover { background: #4338ca; }

    .status-msg { font-size: 11px; color: var(--text-3); text-align: center; min-height: 14px; }
    .status-msg.ok  { color: #15803d; }
    .status-msg.err { color: #dc2626; }

    /* ── Logged-in view ── */
    .main-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }

    .student-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px;
    }
    .student-label {
      font-size: 9px; color: var(--text-3); font-weight: 600;
      text-transform: uppercase; letter-spacing: .07em; margin-bottom: 3px;
    }
    .student-name  { font-size: 13px; font-weight: 600; color: var(--text); }
    .student-key   { font-size: 10px; color: var(--text-3); font-family: "JetBrains Mono", monospace; margin-top: 1px; }

    .divider { height: 1px; background: var(--border-quiet); }

    .dashboard-btn {
      background: var(--indigo); color: #fff; border: none;
      border-radius: 8px; padding: 10px; font-size: 13px;
      font-weight: 600; cursor: pointer; width: 100%;
      transition: background .12s, transform .08s;
      font-family: "DM Sans", sans-serif;
    }
    .dashboard-btn:hover  { background: #4338ca; }
    .dashboard-btn:active { transform: scale(0.98); }

    .switch-link {
      text-align: center; font-size: 11px; color: var(--text-3);
      cursor: pointer; transition: color .12s;
      background: none; border: none; width: 100%; padding: 0;
      font-family: "DM Sans", sans-serif;
    }
    .switch-link:hover { color: var(--text); }

    /* ── Key reveal panel (post signup) ── */
    .key-reveal {
      background: #f0fdf4; border: 1px solid #bbf7d0;
      border-radius: 8px; padding: 12px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .key-reveal-label { font-size: 10px; font-weight: 700; color: #15803d; }
    .key-reveal-key {
      font-family: "JetBrains Mono", monospace; font-size: 11px;
      color: #166534; word-break: break-all; background: #dcfce7;
      border-radius: 5px; padding: 6px 8px;
    }
    .key-reveal-note { font-size: 10px; color: #15803d; }

    /* ── Footer ── */
    .footer {
      border-top: 1px solid var(--border-quiet);
      padding: 9px 16px;
      display: flex; justify-content: space-between; align-items: center;
      background: var(--surface);
    }
    .footer a {
      font-size: 11px; color: var(--text-3);
      text-decoration: none; transition: color .12s;
      font-family: "DM Sans", sans-serif;
    }
    .footer a:hover { color: var(--text); }
    .footer .accent-link { color: var(--accent); font-weight: 600; }
    .footer .accent-link:hover { color: #c41f47; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-box"><span>E</span></div>
    <div class="header-text">
      <div class="title">EALE</div>
      <div class="sub">Evidence-Aligned Learning</div>
    </div>
  </div>

  <!-- ── Auth view (not logged in) ── -->
  <div class="view" id="authView">
    <div class="auth-body">
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Login</button>
        <button class="auth-tab" data-tab="signup">Sign Up</button>
      </div>

      <!-- Login form -->
      <div class="auth-form active" id="loginForm">
        <div>
          <label class="field-label">API Key</label>
          <input class="field-input mono" id="loginKey" type="text" placeholder="e.g. student-alice-key" />
        </div>
        <button class="primary-btn" id="loginBtn">Login</button>
        <div class="status-msg" id="loginStatus"></div>
      </div>

      <!-- Sign up form -->
      <div class="auth-form" id="signupForm">
        <div>
          <label class="field-label">Full name</label>
          <input class="field-input" id="signupName" type="text" placeholder="Your name" />
        </div>
        <div>
          <label class="field-label">Email</label>
          <input class="field-input" id="signupEmail" type="email" placeholder="you@example.com" />
        </div>
        <button class="primary-btn indigo" id="signupBtn">Create account</button>
        <div class="status-msg" id="signupStatus"></div>
        <!-- Key reveal (shown after signup) -->
        <div class="key-reveal" id="keyReveal" style="display:none;">
          <div class="key-reveal-label">Your API Key</div>
          <div class="key-reveal-key" id="newApiKey"></div>
          <div class="key-reveal-note">Save this key — you'll need it to log in.</div>
          <button class="primary-btn" id="continueBtn">Continue to Dashboard</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Logged-in view ── -->
  <div class="view" id="mainView">
    <div class="main-body">
      <div class="student-row">
        <div class="student-label">Logged in as</div>
        <div class="student-name" id="studentName">—</div>
        <div class="student-key" id="studentKey"></div>
      </div>

      <button class="primary-btn" id="quizBtn">Trigger EALE Check on Current Tab</button>
      <div class="status-msg" id="quizStatus"></div>

      <div class="divider"></div>

      <button class="dashboard-btn" id="dashboardBtn">Open Dashboard</button>
      <button class="switch-link" id="switchBtn">Switch account / Logout</button>
    </div>
  </div>

  <div class="footer">
    <a href="#" id="optionsLink">Settings</a>
    <a class="accent-link" href="http://localhost:3000" target="_blank">Open EALE →</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
