<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EALE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff; color: #1e293b;
      width: 280px; padding: 0;
    }

    .header {
      background: #4f46e5; color: #fff;
      padding: 14px 16px; display: flex; align-items: center; gap: 8px;
    }
    .logo-box {
      width: 28px; height: 28px; background: rgba(255,255,255,.2);
      border-radius: 6px; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800;
    }
    .header-text .title { font-size: 14px; font-weight: 700; }
    .header-text .sub { font-size: 10px; opacity: .7; }

    .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }

    .student-row {
      background: #f1f5f9; border-radius: 8px; padding: 10px 12px;
    }
    .student-label { font-size: 10px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 2px; }
    .student-name  { font-size: 13px; font-weight: 600; color: #1e293b; }
    .student-key   { font-size: 10px; color: #94a3b8; font-family: monospace; }

    .quick-select { display: flex; flex-direction: column; gap: 4px; }
    .qs-label { font-size: 10px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
    .qs-btns  { display: flex; gap: 6px; }
    .qs-btn {
      flex: 1; background: #f8fafc; border: 1.5px solid #e2e8f0;
      border-radius: 7px; padding: 6px 4px; font-size: 11px; font-weight: 600;
      color: #475569; cursor: pointer; transition: all .12s; text-align: center;
    }
    .qs-btn:hover { border-color: #4f46e5; background: #eef2ff; color: #4f46e5; }
    .qs-btn.active { border-color: #4f46e5; background: #4f46e5; color: #fff; }

    .quiz-btn {
      background: #4f46e5; color: #fff; border: none; border-radius: 9px;
      padding: 11px; font-size: 13px; font-weight: 700; cursor: pointer;
      transition: background .12s; width: 100%;
    }
    .quiz-btn:hover { background: #4338ca; }
    .quiz-btn:disabled { opacity: .55; cursor: not-allowed; }

    .status-msg { font-size: 11px; color: #64748b; text-align: center; min-height: 14px; }
    .status-msg.ok  { color: #16a34a; }
    .status-msg.err { color: #dc2626; }

    .links { display: flex; gap: 6px; }
    .link-btn {
      flex: 1; background: #f8fafc; border: 1.5px solid #e2e8f0;
      border-radius: 7px; padding: 7px 4px; font-size: 11px; font-weight: 600;
      color: #475569; cursor: pointer; transition: all .12s; text-align: center;
      text-decoration: none; display: block;
    }
    .link-btn:hover { border-color: #818cf8; color: #4f46e5; background: #eef2ff; }

    .footer {
      border-top: 1px solid #f1f5f9; padding: 10px 16px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .footer a { font-size: 11px; color: #94a3b8; text-decoration: none; }
    .footer a:hover { color: #4f46e5; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-box">E</div>
    <div class="header-text">
      <div class="title">EALE</div>
      <div class="sub">Evidence-Aligned Learning</div>
    </div>
  </div>

  <div class="body">
    <!-- Current student -->
    <div class="student-row">
      <div class="student-label">Active Student</div>
      <div class="student-name" id="studentName">Loading…</div>
      <div class="student-key" id="studentKey"></div>
    </div>

    <!-- Quick student selector -->
    <div class="quick-select">
      <span class="qs-label">Switch Demo Student</span>
      <div class="qs-btns">
        <button class="qs-btn" id="aliceBtn" data-key="student-alice-key" data-name="Alice Chen">
          Alice
        </button>
        <button class="qs-btn" id="bobBtn" data-key="student-bob-key" data-name="Bob Martinez">
          Bob
        </button>
      </div>
    </div>

    <!-- Trigger quiz -->
    <button class="quiz-btn" id="quizBtn">Trigger EALE Check on Current Tab</button>
    <div class="status-msg" id="statusMsg"></div>

    <!-- Quick links to dashboards -->
    <div class="links">
      <a class="link-btn" href="http://localhost:3000/student/1" target="_blank">Alice's Dashboard</a>
      <a class="link-btn" href="http://localhost:3000/student/2" target="_blank">Bob's Dashboard</a>
      <a class="link-btn" href="http://localhost:3000/faculty" target="_blank">Faculty</a>
    </div>
  </div>

  <div class="footer">
    <a href="#" id="optionsLink">⚙ Options</a>
    <a href="http://localhost:3000" target="_blank">Open EALE →</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
