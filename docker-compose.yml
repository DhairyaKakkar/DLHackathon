version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: eale
      POSTGRES_USER: eale
      POSTGRES_PASSWORD: eale_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eale -d eale"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://eale:eale_secret@db:5432/eale
      AUTO_SEED: "true"
      USE_LLM_VARIANTS: "false"
      USE_LLM_CONTEXT: "true"
      USE_LLM_GRADING: "true"
      OPENAI_API_KEY: ""
      OPENAI_MODEL: "gpt-4.1"
      LLM_CACHE_TTL_SECONDS: "${LLM_CACHE_TTL_SECONDS:-600}"
      CORS_ORIGINS: "*"
      SCHEDULER_INTERVAL_SECONDS: "60"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:18-alpine
    working_dir: /app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NODE_ENV: development
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "npm install && npm run dev"

volumes:
  pgdata:
