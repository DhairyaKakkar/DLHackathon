version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: eale
      POSTGRES_USER: eale
      POSTGRES_PASSWORD: eale_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eale -d eale"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://eale:eale_secret@db:5432/eale
      AUTO_SEED: "true"
      USE_LLM_VARIANTS: "false"
      OPENAI_API_KEY: ""
      CORS_ORIGINS: "*"
      SCHEDULER_INTERVAL_SECONDS: "60"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
